<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<main class="auth-card">
    <h1>Dang nhap</h1>

    <div class="status success" th:if="${param.registered}">Dang ky thanh cong, vui long dang nhap.</div>
    <div class="status success" th:if="${param.logout}">Dang xuat thanh cong.</div>
    <div class="status danger" th:if="${param.error}">Sai username hoac password.</div>

    <form th:action="@{/login}" method="post" class="form-stack">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Dang nhap</button>
    </form>

    <a class="oauth-btn" th:href="@{/oauth2/authorization/google}">Dang nhap voi Google</a>
    <p>Chua co tai khoan? <a th:href="@{/register}">Dang ky ngay</a></p>
    <p><a th:href="@{/home}">Ve Home</a></p>
</main>
</body>
</html>
