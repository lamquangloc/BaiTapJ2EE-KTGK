<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <div class="admin-head">
        <h1>Cac hoc phan da dang ky</h1>
        <a th:href="@{/home}">Ve Home</a>
    </div>

    <section class="my-course-list" th:if="${!enrollments.isEmpty()}">
        <article class="my-course-card" th:each="enrollment : ${enrollments}">
            <img th:src="${enrollment.course.image != null and !#strings.isEmpty(enrollment.course.image)} ? ${enrollment.course.image} : 'https://via.placeholder.com/640x360?text=Course'"
                 alt="course-image">
            <div>
                <h2 th:text="${enrollment.course.name}">Course Name</h2>
                <p><strong>Tin chi:</strong> <span th:text="${enrollment.course.credits}">3</span></p>
                <p><strong>Giang vien:</strong> <span th:text="${enrollment.course.lecturer}">Lecturer</span></p>
                <p><strong>Ngay dang ky:</strong> <span th:text="${enrollment.enrollDate}">2026-03-23</span></p>
            </div>
        </article>
    </section>

    <div class="empty" th:if="${enrollments.isEmpty()}">
        Ban chua dang ky hoc phan nao.
    </div>
</main>
</body>
</html>
